<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — MDN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}"/>
</head>
<body>
  <div class="auth-bg">
    <div class="particles" id="particles"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-bracket">&lt;</span>MDN<span class="logo-bracket">/&gt;</span>
      </div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Join Manantan Digital Networks</p>

      {% if error %}
        <div class="auth-error">⚠️ {{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="auth-success">✅ {{ success }}</div>
      {% endif %}

      <form method="POST" class="auth-form" id="signupForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" required/>
          <span class="form-error" id="usernameErr"></span>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required/>
          <span class="form-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
          </div>
          <span class="form-error" id="passwordErr"></span>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw2" aria-label="Show confirm password">👁</button>
          </div>
          <span class="form-error" id="confirmErr"></span>
        </div>
        <button type="submit" class="btn-auth" id="signupBtn">
          <span id="btnText">Create Account</span>
          <span class="spinner hidden" id="spinner"></span>
        </button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login">Sign In</a></p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
